# SonarQube Project Configuration for ConnectSphere

# Project identification
sonar.projectKey=connectsphere
sonar.projectName=ConnectSphere
sonar.projectVersion=1.0.0

# Source code location
sonar.sources=auth-service/src/main/java,post-service/src/main/java,comment-service/src/main/java,like-service/src/main/java,follow-service/src/main/java,notification-service/src/main/java,media-service/src/main/java,search-service/src/main/java

# Test code location
sonar.tests=auth-service/src/test/java,post-service/src/test/java,comment-service/src/test/java,like-service/src/test/java,follow-service/src/test/java,notification-service/src/test/java,media-service/src/test/java,search-service/src/test/java

# Java version
sonar.java.source=21
sonar.java.target=21

# Encoding
sonar.sourceEncoding=UTF-8

# Exclude generated files and dependencies
sonar.exclusions=**/target/**,**/node_modules/**,**/uploads/**,**/logs/**

# SonarQube server URL (default local)
sonar.host.url=http://localhost:9000

# Coverage reports location (if using JaCoCo)
sonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml
