spring:
  application:
    name: api-gateway

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
          filters:
            - JwtAuthFilter

        - id: oauth2-route
          uri: lb://auth-service
          predicates:
            - Path=/oauth2/**,/login/oauth2/**
          filters:
            - PreserveHostHeader

        - id: post-service
          uri: lb://post-service
          predicates:
            - Path=/posts/**
          filters:
            - JwtAuthFilter

        - id: comment-service
          uri: lb://comment-service
          predicates:
            - Path=/comments/**
          filters:
            - JwtAuthFilter

        - id: like-service
          uri: lb://like-service
          predicates:
            - Path=/likes/**
          filters:
            - JwtAuthFilter

        - id: follow-service
          uri: lb://follow-service
          predicates:
            - Path=/follows/**
          filters:
            - JwtAuthFilter

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**
          filters:
            - JwtAuthFilter

        - id: media-service
          uri: lb://media-service
          predicates:
            - Path=/media/**,/stories/**
          filters:
            - JwtAuthFilter

        - id: media-files-public
          uri: lb://media-service
          predicates:
            - Path=/media/files/**
          filters: []

        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/search/**,/hashtags/**
          filters:
            - JwtAuthFilter

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/payments/**
          filters:
            - JwtAuthFilter

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins:
              - http://localhost:3000
              - http://localhost:3001
              - ${FRONTEND_URL:http://localhost:3000}
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            exposed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:connectsphere-super-secret-key-must-be-256-bits-long-for-hs256}

service:
  internal:
    token: ${INTERNAL_TOKEN:internal-service-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
